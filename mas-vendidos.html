<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="stylesheet" href="header-origen.css?v=12">
  <link rel="stylesheet" href="footer-origen.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Más Vendidos | Origen Perfumería</title>

  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Times New Roman', serif;
      background:#D9D7D7;
      color:#2f2b1f;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    img{
      max-width:100%;
      display:block;
    }

    .category-hero{
      padding:32px 16px 20px;
      text-align:center;
    }

    .category-hero h1{
      font-size:34px;
      color:#5a4720;
      margin-bottom:10px;
    }

    .category-hero p{
      font-size:15px;
      color:#5f5847;
    }

    .shop-container{
      width:min(1320px, 94%);
      margin:0 auto 40px;
    }

    .products-topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
      flex-wrap:wrap;
      gap:12px;
    }

    .products-topbar p{
      color:#5f5a46;
      font-size:15px;
    }

    .products-grid{
      display:grid;
      grid-template-columns:repeat(4, minmax(0, 1fr));
      gap:18px;
    }

    .product-card{
      position:relative;
      background:transparent;
      cursor:pointer;
    }

    .product-card-link{
      display:block;
    }

    .product-image-wrap{
      position:relative;
      overflow:hidden;
      border-radius:18px;
      background:#efeeee;
      aspect-ratio:4 / 4.5;
    }

    .product-image-wrap img{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      transition:0.35s ease;
    }

    .img-main{
      opacity:1;
    }

    .img-hover{
      opacity:0;
    }

    .product-card:hover .img-main{
      opacity:0;
      transform:scale(1.03);
    }

    .product-card:hover .img-hover{
      opacity:1;
      transform:scale(1.03);
    }

    .product-overlay{
      position:absolute;
      inset:0;
      background:linear-gradient(to top, rgba(0,0,0,0.35), rgba(0,0,0,0.08));
      opacity:0;
      transition:0.35s ease;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:3;
    }

    .product-card:hover .product-overlay{
      opacity:1;
    }

    .overlay-actions{
      position:absolute;
      right:12px;
      top:50%;
      transform:translateY(-50%);
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .circle-btn{
      width:44px;
      height:44px;
      border-radius:50%;
      border:none;
      background:#f1efef;
      color:#1f1f1f;
      font-size:17px;
      display:flex;
      justify-content:center;
      align-items:center;
      cursor:pointer;
      box-shadow:0 10px 20px rgba(0,0,0,0.12);
      transition:0.25s ease;
    }

    .circle-btn:hover{
      transform:scale(1.06);
      color:#c9a227;
    }

    .circle-btn.active{
      background:#5a4720;
      color:#f5f1e8;
    }

    .quick-buy{
      position:absolute;
      left:50%;
      bottom:14px;
      transform:translateX(-50%);
      width:84%;
      background:#efeeee;
      color:#1c1c1c;
      border:none;
      border-radius:14px;
      padding:10px 10px;
      font-size:15px;
      font-family:'Times New Roman', serif;
      cursor:pointer;
      box-shadow:0 10px 25px rgba(0,0,0,0.12);
      transition:0.25s ease;
      z-index:4;
    }

    .quick-buy:hover{
      background:#e5e0d3;
    }

    .tag{
      position:absolute;
      top:12px;
      left:12px;
      z-index:5;
      background:#111;
      color:#fff;
      padding:6px 10px;
      border-radius:999px;
      font-size:11px;
      letter-spacing:.05em;
    }

    .tag.discount{
      background:#b22222;
      top:48px;
    }

    .product-info{
      padding:12px 4px 0;
    }

    .product-category{
      font-size:12px;
      color:#7b7460;
      margin-bottom:6px;
      text-transform:uppercase;
      letter-spacing:.08em;
    }

    .product-name{
      font-size:17px;
      line-height:1.2;
      min-height:44px;
      margin-bottom:8px;
      color:#1f1d18;
    }

    .product-price{
      font-size:20px;
      color:#c9a227;
      font-weight:bold;
    }

    .price-old{
      text-decoration:line-through;
      color:#777;
      font-size:14px;
      margin-bottom:4px;
    }

    /* BOTÓN WHATSAPP */
    .floating-expert{
      position:fixed;
      left:18px;
      bottom:24px;
      display:flex;
      align-items:center;
      gap:10px;
      background:#efeeee;
      color:#5a4720;
      padding:10px 14px 10px 10px;
      border-radius:999px;
      box-shadow:0 10px 24px rgba(0,0,0,0.14);
      z-index:120;
      transition:0.3s ease;
      border:1px solid rgba(90,71,32,0.10);
    }

    .floating-expert:hover{
      transform:translateY(-2px);
      box-shadow:0 14px 28px rgba(0,0,0,0.18);
    }

    .floating-expert-icon{
      width:44px;
      height:44px;
      border-radius:50%;
      background:#c9a227;
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:21px;
      flex-shrink:0;
    }

    .floating-expert-text{
      display:flex;
      flex-direction:column;
      line-height:1.1;
    }

    .floating-expert-text strong{
      font-size:13px;
      color:#5a4720;
      letter-spacing:0.03em;
    }

    .floating-expert-text span{
      font-size:11px;
      color:#7a715c;
    }

    /* BOTÓN TOP */
    .scroll-top{
      position:fixed;
      right:20px;
      bottom:90px;
      width:56px;
      height:56px;
      border-radius:50%;
      background:linear-gradient(135deg, #c9ab72, #b8860b);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 6px 18px rgba(0,0,0,0.18);
      cursor:pointer;
      z-index:130;
      opacity:0;
      visibility:hidden;
      transition:0.3s ease;
      border:none;
    }

    .scroll-top.show{
      opacity:1;
      visibility:visible;
    }

    .scroll-top i{
      font-size:22px;
    }

    .favorites-count-badge{
      position:absolute;
      top:-6px;
      right:-8px;
      min-width:18px;
      height:18px;
      padding:0 5px;
      border-radius:999px;
      background:#c9a227;
      color:#fff;
      font-size:10px;
      font-weight:bold;
      display:flex;
      align-items:center;
      justify-content:center;
      opacity:0;
      transform:scale(0.7);
      transition:0.25s ease;
      pointer-events:none;
    }

    .favorites-count-badge.show{
      opacity:1;
      transform:scale(1);
    }

    .products-actions{
  display:flex;
  gap:12px;
  align-items:center;
  flex-wrap:wrap;
}

.filters-box select,
.sort-box select{
  padding:10px 14px;
  border-radius:12px;
  border:1px solid rgba(90,71,32,0.14);
  background:#efeeee;
  color:#5a4720;
  font-size:14px;
  outline:none;
  font-family:'Times New Roman', serif;
  cursor:pointer;
}

    @media (max-width: 1100px){
      .products-grid{
        grid-template-columns:repeat(3, 1fr);
      }
    }

    @media (max-width: 768px){

      .products-grid{
        grid-template-columns:repeat(2, 1fr);
      }

      .category-hero h1{
        font-size:28px;
      }

      .floating-expert{
        left:12px;
        right:12px;
        bottom:14px;
        justify-content:center;
        border-radius:18px;
        padding:10px 12px;
      }
    }

    @media (max-width: 480px){

      .products-grid{
        gap:12px;
      }

      .product-name{
        font-size:14px;
        min-height:36px;
      }

      .product-price{
        font-size:16px;
      }

      .quick-buy{
        font-size:12px;
        padding:9px 8px;
      }

      .circle-btn{
        width:34px;
        height:34px;
        font-size:13px;
      }

      .scroll-top{
        width:52px;
        height:52px;
        right:16px;
        bottom:84px;
      }
    }
  </style>
</head>

<body>

<div id="origen-header"></div>

<section class="category-hero">
  <h1 id="title">Más Vendidos</h1>
  <p id="resultsText">Explora nuestros perfumes más vendidos.</p>
</section>

<section class="shop-container">

  <div class="products-topbar">
    <div class="products-actions">

  <div class="filters-box">

    <select id="filterCategory">

      <option value="all">Todas las categorías</option>
      <option value="Hombre">Hombre</option>
      <option value="Mujer">Mujer</option>
      <option value="Unisex">Unisex</option>

    </select>

  </div>

  <div class="sort-box">

    <select id="sortSelect">

      <option value="default">Ordenar por destacados</option>
      <option value="price-asc">Precio: menor a mayor</option>
      <option value="price-desc">Precio: mayor a menor</option>
      <option value="name-asc">Nombre: A-Z</option>

    </select>

  </div>

</div>
    <p id="cantidadProductos"></p>
  </div>

  <div class="products-grid" id="productsGrid"></div>

</section>



<!-- BOTÓN WHATSAPP -->
<a class="floating-expert"
   href="https://wa.me/573145661788?text=Hola,%20quiero%20asesor%C3%ADa%20para%20elegir%20un%20perfume"
   target="_blank"
   aria-label="Contacta a un experto">

  <span class="floating-expert-icon">
    <i class="fa-brands fa-whatsapp"></i>
  </span>

  <span class="floating-expert-text">
    <strong>Contacta a un experto</strong>
    <span>Asesoría personalizada</span>
  </span>

</a>

<!-- BOTÓN TOP -->
<button class="scroll-top"
        id="scrollTopBtn"
        aria-label="Subir al inicio">

  <i class="fa-solid fa-arrow-up"></i>

</button>

<div id="origen-footer"></div>

<script>

const grid = document.getElementById("productsGrid");
const title = document.getElementById("title");
const resultsText = document.getElementById("resultsText");
const cantidadProductos = document.getElementById("cantidadProductos");
const scrollTopBtn = document.getElementById("scrollTopBtn");

/* ===== FAVORITOS ===== */

function obtenerFavoritos() {
  return JSON.parse(localStorage.getItem("favoritos")) || [];
}

function guardarFavoritos(favoritos) {
  localStorage.setItem("favoritos", JSON.stringify(favoritos));
}

function estaEnFavoritos(id) {
  return obtenerFavoritos().some(item => item.id === id);
}

function agregarAFavoritos(producto) {
  const favoritos = obtenerFavoritos();

  const existe = favoritos.some(item => item.id === producto.id);

  if (!existe) {
    favoritos.push(producto);
    guardarFavoritos(favoritos);
  }
}

function quitarDeFavoritos(id) {
  const favoritos = obtenerFavoritos()
    .filter(item => item.id !== id);

  guardarFavoritos(favoritos);
}

function toggleFavorito(producto) {

  if (estaEnFavoritos(producto.id)) {
    quitarDeFavoritos(producto.id);
    return false;
  } else {
    agregarAFavoritos(producto);
    return true;
  }
}

/* ===== DESCUENTO ===== */

function calcularPrecio(p) {

  if (p.descuento) {
    return p.precio - (p.precio * p.descuento / 100);
  }

  return p.precio;
}

/* ===== FORMATO ===== */

function formatPrice(value){
  return "$ " + value.toLocaleString("es-CO");
}

/* ===== URL PRODUCTO ===== */

function getProductUrl(producto){

  if(producto.categoria === "Hombre"){
    return `producto-hombre.html?id=${producto.id}`;
  }

  if(producto.categoria === "Mujer"){
    return `producto-mujer.html?id=${producto.id}`;
  }

  if(producto.categoria === "Unisex"){
    return `producto-unisex.html?id=${producto.id}`;
  }

  return "#";
}

/* ===== RENDER ===== */

function render(products){

  grid.innerHTML = "";

  const filtroCategoria =
    document.getElementById("filterCategory").value;

  const orden =
    document.getElementById("sortSelect").value;

  let lista = [...products];

  /* FILTRO */

  if(filtroCategoria !== "all"){

    lista = lista.filter(
      p => p.categoria === filtroCategoria
    );

  }

  /* ORDENAR */

  if(orden === "price-asc"){

    lista.sort((a,b) =>
      calcularPrecio(a) - calcularPrecio(b)
    );

  }

  if(orden === "price-desc"){

    lista.sort((a,b) =>
      calcularPrecio(b) - calcularPrecio(a)
    );

  }

  if(orden === "name-asc"){

    lista.sort((a,b) =>
      a.nombre.localeCompare(b.nombre, "es")
    );

  }

  cantidadProductos.textContent =
    `${lista.length} producto(s) encontrados`;

  if(lista.length === 0){

    grid.innerHTML = `
      <p style="font-size:18px;color:#5a4720;">
        No hay productos disponibles
      </p>
    `;

    return;
  }

  lista.forEach(producto => {

    const precioFinal = producto.descuento
      ? calcularPrecio(producto)
      : producto.precio;

    const article = document.createElement("article");

    article.className = "product-card";

    article.innerHTML = `
      <a href="${getProductUrl(producto)}"
         class="product-card-link">

        <div class="product-image-wrap">

          ${producto.nuevo
            ? `<span class="tag">Nuevo</span>`
            : ''
          }

          ${producto.descuento
            ? `<span class="tag discount">-${producto.descuento}%</span>`
            : ''
          }

          <img class="img-main"
               src="${producto.imagen}"
               alt="${producto.nombre}">

          <img class="img-hover"
               src="${producto.hover || producto.imagen}"
               alt="${producto.nombre}">

          <div class="product-overlay">

            <div class="overlay-actions">

              <button class="circle-btn favorite-btn"
                      type="button"
                      title="Favoritos">

                <i class="fa-regular fa-heart"></i>

              </button>

            </div>

            <button class="quick-buy quick-buy-btn"
                    type="button">

              Compra rápida

            </button>

          </div>

        </div>

        <div class="product-info">

          <div class="product-category">
            ${producto.categoria}
          </div>

          <h3 class="product-name">
            ${producto.nombre}
          </h3>

          ${
            producto.descuento
            ? `
              <p class="price-old">
                ${formatPrice(producto.precio)}
              </p>

              <p class="product-price">
                ${formatPrice(precioFinal)}
              </p>
            `
            : `
              <p class="product-price">
                ${formatPrice(producto.precio)}
              </p>
            `
          }

        </div>

      </a>
    `;

    const favoriteBtn =
      article.querySelector(".favorite-btn");

    const quickBuyBtn =
      article.querySelector(".quick-buy-btn");

    const productoFavorito = {
      id: producto.id,
      nombre: producto.nombre,
      precio: precioFinal,
      imagen: producto.imagen,
      url: getProductUrl(producto),
      categoria: producto.categoria
    };

    if (estaEnFavoritos(producto.id)) {

      favoriteBtn.classList.add("active");

      favoriteBtn.innerHTML =
        `<i class="fa-solid fa-heart"></i>`;
    }

    favoriteBtn.addEventListener("click", (e) => {

      e.preventDefault();
      e.stopPropagation();

      const agregado =
        toggleFavorito(productoFavorito);

      if (agregado) {

        favoriteBtn.classList.add("active");

        favoriteBtn.innerHTML =
          `<i class="fa-solid fa-heart"></i>`;

      } else {

        favoriteBtn.classList.remove("active");

        favoriteBtn.innerHTML =
          `<i class="fa-regular fa-heart"></i>`;
      }
    });

    quickBuyBtn.addEventListener("click", (e) => {

      e.preventDefault();
      e.stopPropagation();

      if (typeof agregarAlCarrito !== "function") {
        return;
      }

      agregarAlCarrito({
        id: producto.id,
        nombre: producto.nombre,
        precio: Number(precioFinal),
        imagen: producto.imagen,
        url: getProductUrl(producto),
        categoria: producto.categoria
      }, 1);

    });

    grid.appendChild(article);

  });
}
/* ===== CARGAR JSON ===== */

async function cargarProductos() {

  try {

    const res = await fetch("data/mas-vendidos.json");

    const data = await res.json();

    let productos = data.mas_vendidos || [];

    const tipo =
      new URLSearchParams(window.location.search)
      .get("tipo") || "mas_vendidos";

    if (tipo === "mas_vendidos") {

      title.innerText = "Más Vendidos";

      resultsText.innerText =
        `${productos.length} productos`;
    }

    if (tipo === "nuevos") {

      title.innerText = "Nuevos";

      productos = productos.filter(p => p.nuevo);

      resultsText.innerText =
        `${productos.length} productos`;
    }

    if (tipo === "descuentos") {

      title.innerText = "Descuentos";

      productos = productos.filter(p => p.descuento);

      resultsText.innerText =
        `${productos.length} productos`;
    }

    render(productos);

  } catch (error) {

    console.error("Error cargando JSON:", error);

    grid.innerHTML = `
      <p style="text-align:center;">
        Error cargando productos
      </p>
    `;
  }
}

/* ===== SCROLL TOP ===== */

window.addEventListener("scroll", () => {

  if(window.scrollY > 500){
    scrollTopBtn.classList.add("show");
  } else {
    scrollTopBtn.classList.remove("show");
  }

});

scrollTopBtn.addEventListener("click", () => {

  window.scrollTo({
    top: 0,
    behavior: "smooth"
  });

});

/* ===== INIT ===== */

cargarProductos();
document
  .getElementById("sortSelect")
  .addEventListener("change", cargarProductos);

document
  .getElementById("filterCategory")
  .addEventListener("change", cargarProductos);

</script>

<script src="header-origen.js?v=12"></script>

<script>

fetch("footer-origen.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("origen-footer").innerHTML = data;
  });

</script>

<script src="carrito.js"></script>

</body>
</html>
