<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Más Vendidos | Origen Perfumería</title>

  <link rel="stylesheet" href="header-origen.css?v=12">
  <link rel="stylesheet" href="footer-origen.css">

  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }
    body{
      font-family:'Times New Roman', serif;
      background:#D9D7D7;
      color:#2f2b1f;
    }
    a{
      text-decoration:none;
      color:inherit;
    }
    button{
      font-family:inherit;
    }
    img{
      max-width:100%;
      display:block;
    }

    .top-announcement{
      position:relative;
      background:linear-gradient(90deg, #ece7da, #ddd6c3, #ece7da);
      color:#5a4720;
      height:38px;
      overflow:hidden;
      border-bottom:1px solid rgba(90,71,32,0.08);
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .announcement-track{
      position:relative;
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .announcement-item{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%, -50%);
      opacity:0;
      transition:opacity 0.7s ease, transform 0.7s ease;
      font-size:12.5px;
      font-weight:600;
      letter-spacing:0.04em;
      white-space:nowrap;
      color:#5a4720;
    }
    .announcement-item.active{
      opacity:1;
      transform:translate(-50%, -50%);
    }

    .info-bar{
      background:#ece8dd;
      color:#5a4720;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:8px 24px;
      font-size:12px;
      border-bottom:1px solid rgba(90,71,32,0.15);
    }
    .info-left{
      display:flex;
      gap:22px;
      flex-wrap:wrap;
    }
    .info-link{
      display:flex;
      align-items:center;
      gap:6px;
      color:#5a4720;
      transition:0.3s;
    }
    .info-link:hover{
      color:#c9a227;
    }

    .main-header{
      background:#D9D7D7;
      border-bottom:1px solid rgba(0,0,0,0.05);
      display:grid;
      grid-template-columns:1fr auto 1fr;
      align-items:center;
      padding:6px 24px;
      gap:12px;
      min-height:72px;
    }
    .search-box{
      display:flex;
      justify-content:flex-start;
    }
    .search-box form{
      width:100%;
      display:flex;
    }
    .search-box input{
      width:220px;
      max-width:100%;
      padding:10px 14px;
      border-radius:10px;
      border:1px solid rgba(90,71,32,0.15);
      background:#efeded;
      color:#5a4720;
      font-size:13px;
      outline:none;
    }
    .search-box input::placeholder{
      color:#756b52;
    }
    .header-logo a{
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }
    .header-logo{
      display:flex;
      justify-content:center;
      align-items:center;
    }
    .header-logo img{
      width:300px;
      max-width:100%;
      display:block;
    }
    .header-icons{
      display:flex;
      justify-content:flex-end;
      align-items:center;
      gap:14px;
    }
    .header-icons a{
      text-decoration:none;
      color:#5a4720;
      font-size:20px;
      transition:0.3s;
    }
    .header-icons a:hover{
      color:#c9a227;
      transform:translateY(-2px);
    }

    

    .mobile-category-tabs{
      display:none;
    }

    .category-hero{
      padding:24px 16px 16px;
      text-align:center;
    }
    .category-hero h1{
      font-size:28px;
      color:#5a4720;
      margin-bottom:8px;
    }
    .category-hero p{
      max-width:700px;
      margin:0 auto;
      font-size:14px;
      color:#5f5847;
    }

    .mobile-tools-bar{
      display:none;
    }

    .shop-container{
      width:min(1320px, 94%);
      margin:0 auto 34px;
      display:grid;
      grid-template-columns:220px 1fr;
      gap:18px;
      align-items:start;
    }

    .filters-overlay{
      display:none;
    }

    .filters{
      background:#e7e3df;
      border:1px solid rgba(90,71,32,0.08);
      border-radius:18px;
      padding:16px;
      position:sticky;
      top:16px;
      overflow:hidden;
      width:100%;
    }
    .filters-mobile-header{
      display:none;
    }

    .filter-block{
      padding-bottom:18px;
      margin-bottom:18px;
      border-bottom:1px solid rgba(90,71,32,0.10);
    }
    .filter-block:last-child{
      border-bottom:none;
      margin-bottom:0;
      padding-bottom:0;
    }
    .filter-title{
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-size:17px;
      color:#2e2a1e;
      margin-bottom:14px;
      cursor:pointer;
      user-select:none;
    }
    .filter-title i{
      transition:transform 0.3s ease;
    }
    .filter-list{
      list-style:none;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .filter-list li label{
      display:flex;
      align-items:center;
      gap:8px;
      cursor:pointer;
      font-size:13px;
      color:#5a4720;
    }
    .filter-list input{
      accent-color:#c9a227;
      width:15px;
      height:15px;
    }

    .price-range{
      margin-top:8px;
    }
    .range-slider{
      position:relative;
      height:24px;
      margin:14px 0 14px;
    }
    .range-slider input[type="range"]{
      position:absolute;
      left:0;
      top:50%;
      transform:translateY(-50%);
      width:100%;
      pointer-events:none;
      appearance:none;
      -webkit-appearance:none;
      background:transparent;
      height:6px;
      margin:0;
    }
    .range-track{
      position:absolute;
      left:0;
      top:50%;
      transform:translateY(-50%);
      width:100%;
      height:6px;
      background:#cfc8b4;
      border-radius:999px;
    }
    .range-fill{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      height:6px;
      background:#c9a227;
      border-radius:999px;
    }
    .range-slider input[type="range"]::-webkit-slider-thumb{
      pointer-events:auto;
      appearance:none;
      -webkit-appearance:none;
      width:18px;
      height:18px;
      border-radius:50%;
      background:#5a4720;
      cursor:pointer;
      border:none;
      box-shadow:0 2px 6px rgba(0,0,0,0.15);
    }
    .range-slider input[type="range"]::-moz-range-thumb{
      pointer-events:auto;
      width:18px;
      height:18px;
      border-radius:50%;
      background:#5a4720;
      cursor:pointer;
      border:none;
      box-shadow:0 2px 6px rgba(0,0,0,0.15);
    }

    .price-boxes{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }
    .price-box{
      flex:1;
      min-width:92px;
      background:#f0eeee;
      border:1px solid rgba(90,71,32,0.12);
      border-radius:10px;
      padding:10px 8px;
      font-size:13px;
      color:#5a4720;
      text-align:center;
    }
    .price-text{
      font-size:13px;
      color:#5f5a46;
    }

    .floating-expert{
  position:fixed;
  left:18px;
  bottom:24px;
  display:flex;
  align-items:center;
  gap:10px;
  background:#efeeee;
  color:#5a4720;
  padding:10px 14px 10px 10px;
  border-radius:999px;
  box-shadow:0 10px 24px rgba(0,0,0,0.14);
  z-index:120;
  transition:0.3s ease;
  border:1px solid rgba(90,71,32,0.10);
}
.floating-expert:hover{
  transform:translateY(-2px);
  box-shadow:0 14px 28px rgba(0,0,0,0.18);
}
.floating-expert-icon{
  width:44px;
  height:44px;
  border-radius:50%;
  background:#c9a227;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:21px;
  flex-shrink:0;
}
.floating-expert-text{
  display:flex;
  flex-direction:column;
  line-height:1.1;
}
.floating-expert-text strong{
  font-size:13px;
  color:#5a4720;
  letter-spacing:0.03em;
}
.floating-expert-text span{
  font-size:11px;
  color:#7a715c;
}

    .products-topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      margin-bottom:16px;
      flex-wrap:wrap;
    }
    .products-topbar p{
      color:#5f5a46;
      font-size:14px;
    }
    .sort-box select{
      padding:9px 12px;
      border-radius:10px;
      border:1px solid rgba(90,71,32,0.14);
      background:#efeeee;
      color:#5a4720;
      font-size:13px;
      outline:none;
    }

    .products-grid{
      display:grid;
      grid-template-columns:repeat(4, minmax(0, 1fr));
      gap:16px;
    }

    .product-card{
      position:relative;
      background:transparent;
      cursor:pointer;
    }
    .product-link{
      display:block;
    }
    .product-image-wrap{
      position:relative;
      overflow:hidden;
      border-radius:16px;
      background:#efeeee;
      aspect-ratio:4 / 4.4;
    }
    .product-image-wrap img{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      transition:opacity 0.35s ease, transform 0.45s ease;
    }
    .img-main{ opacity:1; }
    .img-hover{ opacity:0; }

    .product-card:hover .img-main{
      opacity:0;
      transform:scale(1.03);
    }
    .product-card:hover .img-hover{
      opacity:1;
      transform:scale(1.03);
    }

    .product-overlay{
      position:absolute;
      inset:0;
      background:linear-gradient(to top, rgba(0,0,0,0.35), rgba(0,0,0,0.08));
      opacity:0;
      transition:0.35s ease;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:3;
    }
    .product-card:hover .product-overlay{
      opacity:1;
    }

    .overlay-actions{
      position:absolute;
      right:12px;
      top:50%;
      transform:translateY(-50%);
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .circle-btn{
      width:44px;
      height:44px;
      border-radius:50%;
      border:none;
      background:#f1efef;
      color:#1f1f1f;
      font-size:17px;
      display:flex;
      justify-content:center;
      align-items:center;
      cursor:pointer;
      box-shadow:0 10px 20px rgba(0,0,0,0.12);
      transition:0.25s ease;
    }
    .circle-btn:hover{
      transform:scale(1.06);
      color:#c9a227;
    }

    .quick-buy{
      position:absolute;
      left:50%;
      bottom:14px;
      transform:translateX(-50%);
      width:84%;
      background:#efeeee;
      color:#1c1c1c;
      border:none;
      border-radius:14px;
      padding:10px 10px;
      font-size:15px;
      font-family:'Times New Roman', serif;
      cursor:pointer;
      box-shadow:0 10px 25px rgba(0,0,0,0.12);
      transition:0.25s ease;
      z-index:4;
    }
    .quick-buy:hover{
      background:#e5e0d3;
    }

    .product-info{
      padding:10px 4px 0;
    }
    .product-name{
      font-size:16px;
      line-height:1.15;
      color:#1f1d18;
      margin-bottom:6px;
      min-height:44px;
    }
    .product-price{
      font-size:19px;
      color:#c9a227;
      font-weight:bold;
    }

    .hidden{
      display:none !important;
    }

    .quickview-modal{
      position:fixed;
      inset:0;
      background:rgba(25,24,20,0.30);
      backdrop-filter:blur(6px);
      -webkit-backdrop-filter:blur(6px);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      z-index:9999;
      opacity:0;
      visibility:hidden;
      transition:0.3s ease;
    }
    .quickview-modal.active{
      opacity:1;
      visibility:visible;
    }
    .quickview-box{
      position:relative;
      width:min(1060px, 100%);
      max-height:90vh;
      overflow:auto;
      background:rgba(245,242,237,0.94);
      border:1px solid rgba(255,255,255,0.40);
      border-radius:24px;
      box-shadow:0 22px 55px rgba(0,0,0,0.18);
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:26px;
      padding:30px;
    }
    .quickview-close{
      position:absolute;
      top:14px;
      right:14px;
      width:42px;
      height:42px;
      border:none;
      border-radius:50%;
      background:#f1efef;
      color:#2f2b1f;
      font-size:18px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 10px 18px rgba(0,0,0,0.10);
      transition:0.25s ease;
      z-index:2;
    }
    .quickview-close:hover{
      background:#e8e3d8;
      transform:scale(1.04);
    }
    .quickview-image{
      background:#efeeee;
      border-radius:22px;
      overflow:hidden;
      min-height:440px;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .quickview-image img{
      width:100%;
      height:100%;
      max-height:520px;
      object-fit:contain;
    }
    .quickview-content{
      display:flex;
      flex-direction:column;
      justify-content:center;
      padding:10px 6px 10px 0;
    }
    .quickview-title{
      font-size:38px;
      line-height:1.08;
      color:#5a4720;
      margin-bottom:12px;
    }
    .quickview-price{
      font-size:22px;
      color:#5f5a46;
      margin-bottom:18px;
    }
    .quickview-description{
      font-size:16px;
      line-height:1.7;
      color:#4d493b;
      margin-bottom:18px;
    }
    .quickview-link{
      display:inline-block;
      margin-bottom:18px;
      color:#5a4720;
      text-decoration:underline;
      font-size:15px;
      width:fit-content;
    }
    .quickview-link:hover{
      color:#c9a227;
    }
    .quickview-stock{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:22px;
      color:#5a4720;
      font-size:16px;
      font-weight:bold;
    }
    .stock-dot{
      width:12px;
      height:12px;
      border-radius:50%;
      background:#c9a227;
      box-shadow:0 0 0 6px rgba(201,162,39,0.10);
      flex-shrink:0;
    }
    .quickview-meta{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:20px;
    }
    .quickview-chip{
      background:#ece7da;
      color:#5a4720;
      border:1px solid rgba(90,71,32,0.10);
      border-radius:999px;
      padding:9px 14px;
      font-size:13px;
    }
    .quickview-label{
      font-size:16px;
      color:#3c3828;
      margin-bottom:10px;
    }
    .quickview-cart-row{
      display:grid;
      grid-template-columns:145px 1fr;
      gap:14px;
      margin-bottom:14px;
    }
    .qty-box{
      display:flex;
      align-items:center;
      justify-content:space-between;
      border:1px solid rgba(90,71,32,0.14);
      background:#efeeee;
      border-radius:12px;
      height:52px;
      overflow:hidden;
    }
    .qty-btn{
      width:46px;
      height:52px;
      border:none;
      background:transparent;
      color:#5a4720;
      font-size:22px;
      cursor:pointer;
      transition:0.2s ease;
    }
    .qty-btn:hover{
      background:#e8e3d8;
    }
    .qty-value{
      font-size:20px;
      color:#3a3626;
      min-width:30px;
      text-align:center;
    }
    .quickview-btn{
      min-width:190px;
      padding:14px 22px;
      border-radius:14px;
      border:none;
      cursor:pointer;
      font-family:'Times New Roman', serif;
      font-size:17px;
      transition:0.25s ease;
    }
    .quickview-btn.primary{
      background:#efeeee;
      color:#2f2b1f;
      border:1px solid rgba(90,71,32,0.20);
    }
    .quickview-btn.primary:hover{
      background:#e5e0d3;
    }
    .quickview-btn.buy{
      width:100%;
      background:#5a4720;
      color:#fff;
      margin-bottom:14px;
    }
    .quickview-btn.buy:hover{
      background:#70582a;
    }
    .quickview-btn.secondary{
      width:100%;
      background:#efe9de;
      color:#2f2b1f;
      border:1px solid rgba(90,71,32,0.14);
    }
    .quickview-btn.secondary:hover{
      background:#e5e0d3;
    }

    .sort-modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.28);
      z-index:9999;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      opacity:0;
      visibility:hidden;
      transition:0.3s ease;
    }
    .sort-modal.active{
      opacity:1;
      visibility:visible;
    }
    .sort-modal-box{
      width:100%;
      max-width:520px;
      background:#f4f1eb;
      border-radius:22px 22px 0 0;
      padding:18px 18px 24px;
      transform:translateY(100%);
      transition:transform 0.3s ease;
    }
    .sort-modal.active .sort-modal-box{
      transform:translateY(0);
    }
    .sort-modal-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:16px;
    }
    .sort-modal-header h3{
      font-size:24px;
      font-weight:normal;
      color:#2f2b1f;
    }
    .sort-options{
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .sort-option{
      width:100%;
      text-align:left;
      border:1px solid rgba(90,71,32,0.10);
      background:#efeeee;
      color:#2f2b1f;
      border-radius:14px;
      padding:14px 16px;
      font-size:16px;
      cursor:pointer;
    }

    .scroll-top{
  position:fixed;
  right:20px;
  bottom:90px;
  width:56px;
  height:56px;
  border-radius:50%;
  background:linear-gradient(135deg, #c9ab72, #b8860b);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 6px 18px rgba(0,0,0,0.18);
  cursor:pointer;
  z-index:130;
  opacity:0;
  visibility:hidden;
  transition:0.3s ease;
  border:none;
}
.scroll-top.show{
  opacity:1;
  visibility:visible;
}
.scroll-top i{
  font-size:22px;
}

    
    .benefit-item{
      text-align:center;
      color:#2f2b1f;
    }
    .benefit-item i{
      font-size:28px;
      margin-bottom:14px;
      color:#2f2b1f;
    }
    .benefit-item h4{
      font-size:18px;
      margin-bottom:10px;
      color:#2f2b1f;
    }
    .benefit-item p{
      font-size:14px;
      line-height:1.5;
      color:#3f3a2c;
      max-width:260px;
      margin:0 auto;
    }
    

    /* BOTÓN */
.btn-primary{
  display:block;
  width:100%;
  text-align:center;
  background:#5a4720;
  color:#f5f1e8;
  padding:14px 18px;
  border-radius:12px;
  font-size:16px;
  font-family:'Times New Roman', serif;
  transition:0.3s ease;
}
.btn-primary:hover{
  background:#6a5428;
}

/* OVERLAY */
.cart-icon-wrap{
  position:relative;
  display:inline-flex;
  align-items:center;
  justify-content:center;
}

.cart-count{
  position:absolute;
  top:-8px;
  right:-10px;
  min-width:18px;
  height:18px;
  padding:0 5px;
  border-radius:999px;
  background:#c9a227;
  color:#fff;
  font-size:11px;
  font-weight:bold;
  display:none;
  align-items:center;
  justify-content:center;
  line-height:1;
}

.btn-primary{
  display:block;
  width:100%;
  text-align:center;
  background:#5a4720;
  color:#f5f1e8;
  padding:14px 18px;
  border-radius:12px;
  font-size:16px;
  font-family:'Times New Roman', serif;
  transition:0.3s ease;
}

.btn-primary:hover{
  background:#6a5428;
}

.cart-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  opacity:0;
  visibility:hidden;
  transition:0.3s;
  z-index:150;
}

.cart-overlay.active{
  opacity:1;
  visibility:visible;
}

.cart-sidebar{
  position:fixed;
  top:0;
  right:-100%;
  width:360px;
  max-width:92vw;
  height:100%;
  background:#f8f5ef;
  box-shadow:-10px 0 30px rgba(0,0,0,0.2);
  z-index:200;
  transition:0.4s ease;
  display:flex;

<body>

<div id="origen-header"></div>

<!-- HERO -->

<section class="category-hero">

  <h1 id="title">Más Vendidos</h1>

  <p id="resultsText">
    Explora nuestros perfumes más vendidos.
  </p>

</section>

<!-- SHOP -->

<section class="shop-container">

  <!-- FILTERS -->

  <aside class="filters">

    <div class="filter-block">

      <div class="filter-title">
        <h3>Categorías</h3>
        <i class="fa-solid fa-chevron-up"></i>
      </div>

      <div class="filter-list">

        <label>
          <input type="checkbox" value="Hombre">
          Perfumes Hombre
        </label>

        <label>
          <input type="checkbox" value="Mujer">
          Perfumes Mujer
        </label>

        <label>
          <input type="checkbox" value="Unisex">
          Perfumes Unisex
        </label>

      </div>

    </div>

    <div class="filter-block">

      <div class="filter-title">
        <h3>Precio</h3>
        <i class="fa-solid fa-chevron-up"></i>
      </div>

      <input
        type="range"
        min="0"
        max="1000000"
        value="1000000"
        class="price-slider"
        id="priceRange"
      >

      <input
        type="text"
        class="price-box"
        id="priceValue"
        value="$ 1.000.000"
        readonly
      >

    </div>

  </aside>

  <!-- PRODUCTS -->

  <div class="products-area">

    <div class="products-topbar">

      <p id="cantidadProductos"></p>

      <select class="sort-select" id="sortSelect">

        <option value="destacados">
          Ordenar por destacados
        </option>

        <option value="menor">
          Precio: menor a mayor
        </option>

        <option value="mayor">
          Precio: mayor a menor
        </option>

        <option value="az">
          Nombre: A-Z
        </option>

      </select>

    </div>

    <div class="products-grid" id="productsGrid"></div>

  </div>

</section>

<!-- FLOATING -->

<a
  href="https://wa.me/573001112233"
  class="floating-whatsapp"
  target="_blank"
>
  <i class="fab fa-whatsapp"></i>
</a>

<button class="scroll-top" id="scrollTopBtn">
  <i class="fa-solid fa-chevron-up"></i>
</button>

<div id="origen-footer"></div>

<script>

const grid = document.getElementById("productsGrid");
const title = document.getElementById("title");
const resultsText = document.getElementById("resultsText");
const cantidadProductos = document.getElementById("cantidadProductos");
const sortSelect = document.getElementById("sortSelect");
const priceRange = document.getElementById("priceRange");
const priceValue = document.getElementById("priceValue");

let TODOS = [];

/* =========================
   DESCUENTO
========================= */

function calcularPrecio(p){

  if(p.descuento){
    return p.precio - (p.precio * p.descuento / 100);
  }

  return p.precio;
}

/* =========================
   FORMATO PRECIO
========================= */

function formatPrice(value){
  return "$ " + value.toLocaleString("es-CO");
}

/* =========================
   URL PRODUCTO
========================= */

function getProductUrl(producto){

  if(producto.categoria === "Hombre"){
    return `producto-hombre.html?id=${producto.id}`;
  }

  if(producto.categoria === "Mujer"){
    return `producto-mujer.html?id=${producto.id}`;
  }

  if(producto.categoria === "Unisex"){
    return `producto-unisex.html?id=${producto.id}`;
  }

  return "#";
}

/* =========================
   RENDER
========================= */

function render(products){

  grid.innerHTML = "";

  cantidadProductos.textContent =
    `${products.length} producto(s) encontrados`;

  if(products.length === 0){

    grid.innerHTML = `
      <p style="font-size:16px;color:#5a4720;">
        No hay productos disponibles
      </p>
    `;

    return;
  }

  products.forEach(producto => {

    grid.innerHTML += `

      <article class="product-card">

        <a href="${getProductUrl(producto)}"
           class="product-card-link">

          <div class="product-image-wrap">

            ${producto.nuevo
              ? `<span class="tag">Nuevo</span>`
              : ''
            }

            ${producto.descuento
              ? `<span class="tag discount">-${producto.descuento}%</span>`
              : ''
            }

            <img
              class="img-main"
              src="${producto.imagen}"
              alt="${producto.nombre}"
            >

            <img
              class="img-hover"
              src="${producto.hover || producto.imagen}"
              alt="${producto.nombre}"
            >

          </div>

          <div class="product-info">

            <div class="product-category">
              ${producto.categoria}
            </div>

            <h3 class="product-name">
              ${producto.nombre}
            </h3>

            ${
              producto.descuento
              ? `
                <p class="price-old">
                  ${formatPrice(producto.precio)}
                </p>

                <p class="product-price">
                  ${formatPrice(calcularPrecio(producto))}
                </p>
              `
              : `
                <p class="product-price">
                  ${formatPrice(producto.precio)}
                </p>
              `
            }

          </div>

        </a>

      </article>

    `;

  });

}

/* =========================
   FILTROS
========================= */

function aplicarFiltros(){

  let productos = [...TODOS];

  /* Categorías */

  const checks = document.querySelectorAll(
    '.filter-list input:checked'
  );

  const categorias = [...checks].map(c => c.value);

  if(categorias.length > 0){

    productos = productos.filter(p =>
      categorias.includes(p.categoria)
    );

  }

  /* Precio */

  const maxPrecio = parseInt(priceRange.value);

  productos = productos.filter(p =>
    calcularPrecio(p) <= maxPrecio
  );

  /* Orden */

  const orden = sortSelect.value;

  if(orden === "menor"){

    productos.sort((a,b) =>
      calcularPrecio(a) - calcularPrecio(b)
    );

  }

  if(orden === "mayor"){

    productos.sort((a,b) =>
      calcularPrecio(b) - calcularPrecio(a)
    );

  }

  if(orden === "az"){

    productos.sort((a,b) =>
      a.nombre.localeCompare(b.nombre)
    );

  }

  render(productos);

}

/* =========================
   EVENTS
========================= */

document.addEventListener("change", aplicarFiltros);

priceRange.addEventListener("input", () => {

  priceValue.value =
    formatPrice(parseInt(priceRange.value));

  aplicarFiltros();

});

/* =========================
   LOAD JSON
========================= */

async function cargarProductos(){

  try{

    const res = await fetch("data/mas-vendidos.json");

    const data = await res.json();

    let productos = data.mas_vendidos || [];

    TODOS = productos;

    const tipo =
      new URLSearchParams(window.location.search)
      .get("tipo") || "mas_vendidos";

    if(tipo === "mas_vendidos"){

      title.innerText = "Más Vendidos";

      resultsText.innerText =
        `${productos.length} productos`;

    }

    if(tipo === "nuevos"){

      title.innerText = "Nuevos";

      productos = productos.filter(p => p.nuevo);

      TODOS = productos;

      resultsText.innerText =
        `${productos.length} productos`;

    }

    if(tipo === "descuentos"){

      title.innerText = "Descuentos";

      productos = productos.filter(p => p.descuento);

      TODOS = productos;

      resultsText.innerText =
        `${productos.length} productos`;

    }

    render(productos);

  }catch(error){

    console.error("Error cargando JSON:", error);

    grid.innerHTML = `
      <p style="text-align:center;">
        Error cargando productos
      </p>
    `;

  }

}

cargarProductos();

/* =========================
   SCROLL TOP
========================= */

const scrollTopBtn =
  document.getElementById("scrollTopBtn");

window.addEventListener("scroll", () => {

  if(window.scrollY > 300){

    scrollTopBtn.classList.add("show");

  }else{

    scrollTopBtn.classList.remove("show");

  }

});

scrollTopBtn.addEventListener("click", () => {

  window.scrollTo({
    top:0,
    behavior:"smooth"
  });

});

</script>

</script>

</body>
