<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="stylesheet" href="header-origen.css?v=12">
  <link rel="stylesheet" href="footer-origen.css">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Más Vendidos | Origen Perfumería</title>

  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      font-family:'Times New Roman', serif;
      background:#d9d7d7;
      color:#2f2b1f;
      overflow-x:hidden;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    img{
      max-width:100%;
      display:block;
    }

    /* ================= HERO ================= */

   .category-hero{
      padding:24px 16px 16px;
      text-align:center;
    }
    .category-hero h1{
      font-size:28px;
      color:#5a4720;
      margin-bottom:8px;
    }

    .category-hero p{
      max-width:700px;
      margin:0 auto;
      font-size:14px;
      color:#5f5847;
    }
    /* ================= SHOP ================= */

    .shop-container{
      width:min(1500px,94%);
      margin:0 auto 60px;
      display:flex;
      gap:34px;
      align-items:flex-start;
    }

    /* ================= SIDEBAR ================= */

     .filters-overlay{
      display:none;
    }

    .filters{
      background:#e7e3df;
      border:1px solid rgba(90,71,32,0.08);
      border-radius:18px;
      padding:16px;
      position:sticky;
      top:16px;
      overflow:hidden;
      width:100%;
    }
    .filters-mobile-header{
      display:none;
    }

    .filter-block{
      padding-bottom:18px;
      margin-bottom:18px;
      border-bottom:1px solid rgba(90,71,32,0.10);
    }
    .filter-block:last-child{
      border-bottom:none;
      margin-bottom:0;
      padding-bottom:0;
    }
    .filter-title{
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-size:17px;
      color:#2e2a1e;
      margin-bottom:14px;
      cursor:pointer;
      user-select:none;
    }
    .filter-title i{
      transition:transform 0.3s ease;
    }
    .filter-list{
      list-style:none;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .filter-list li label{
      display:flex;
      align-items:center;
      gap:8px;
      cursor:pointer;
      font-size:13px;
      color:#5a4720;
    }
    .filter-list input{
      accent-color:#c9a227;
      width:15px;
      height:15px;
    }

    

    /* ================= RANGE ================= */

    .price-range{
      margin-top:8px;
    }
    .range-slider{
      position:relative;
      height:24px;
      margin:14px 0 14px;
    }
    .range-slider input[type="range"]{
      position:absolute;
      left:0;
      top:50%;
      transform:translateY(-50%);
      width:100%;
      pointer-events:none;
      appearance:none;
      -webkit-appearance:none;
      background:transparent;
      height:6px;
      margin:0;
    }
    .range-track{
      position:absolute;
      left:0;
      top:50%;
      transform:translateY(-50%);
      width:100%;
      height:6px;
      background:#cfc8b4;
      border-radius:999px;
    }
    .range-fill{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      height:6px;
      background:#c9a227;
      border-radius:999px;
    }
    .range-slider input[type="range"]::-webkit-slider-thumb{
      pointer-events:auto;
      appearance:none;
      -webkit-appearance:none;
      width:18px;
      height:18px;
      border-radius:50%;
      background:#5a4720;
      cursor:pointer;
      border:none;
      box-shadow:0 2px 6px rgba(0,0,0,0.15);
    }
    .range-slider input[type="range"]::-moz-range-thumb{
      pointer-events:auto;
      width:18px;
      height:18px;
      border-radius:50%;
      background:#5a4720;
      cursor:pointer;
      border:none;
      box-shadow:0 2px 6px rgba(0,0,0,0.15);
    }

    .price-boxes{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }
    .price-box{
      flex:1;
      min-width:92px;
      background:#f0eeee;
      border:1px solid rgba(90,71,32,0.12);
      border-radius:10px;
      padding:10px 8px;
      font-size:13px;
      color:#5a4720;
      text-align:center;
    }
    .price-text{
      font-size:13px;
      color:#5f5a46;
    }

    /* ================= CONTENT ================= */

    .shop-content{
      flex:1;
      min-width:0;
    }

    .products-topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:18px;
      gap:20px;
      flex-wrap:wrap;
    }

    .products-topbar p{
      font-size:16px;
      color:#665a42;
    }

    .sort-select{
      min-width:235px;
      height:40px;
      border:none;
      border-radius:12px;
      background:#f3f1ee;
      padding:0 14px;
      font-size:16px;
      color:#5a4720;
      font-family:'Times New Roman', serif;
      outline:none;
      cursor:pointer;
    }

    /* ================= GRID ================= */

    .products-grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:28px 18px;
    }

    .product-card{
      position:relative;
    }

    .product-card-link{
      display:block;
    }

    .product-image-wrap{
      position:relative;
      overflow:hidden;
      border-radius:22px;
      background:#efeeee;
      aspect-ratio:1/1.18;
    }

    .product-image-wrap img{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:contain;
      transition:.35s ease;
      padding:18px;
    }

    .img-hover{
      opacity:0;
    }

    .product-card:hover .img-main{
      opacity:0;
      transform:scale(1.03);
    }

    .product-card:hover .img-hover{
      opacity:1;
      transform:scale(1.03);
    }

    /* ================= TAGS ================= */

    .tag{
      position:absolute;
      top:14px;
      left:14px;
      z-index:5;
      background:#111;
      color:#fff;
      padding:6px 11px;
      border-radius:999px;
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.06em;
    }

    .tag.discount{
      background:#a01919;
      top:48px;
    }

    /* ================= INFO ================= */

    .product-info{
      padding:12px 6px 0;
    }

    .product-category{
      font-size:14px;
      color:#4b4031;
      margin-bottom:2px;
    }

    .product-name{
      font-size:20px;
      line-height:1.05;
      color:#2d2419;
      font-weight:bold;
      margin-bottom:10px;
      min-height:46px;
    }

    .price-old{
      text-decoration:line-through;
      color:#777;
      font-size:14px;
      margin-bottom:3px;
    }

    .product-price{
      font-size:20px;
      color:#c79b1b;
      font-weight:bold;
    }

    /* ================= WHATSAPP ================= */

    .whatsapp-fixed{
      position:fixed;
      left:20px;
      bottom:22px;
      z-index:999;
      background:#ece7e1;
      border-radius:999px;
      padding:10px 18px 10px 12px;
      display:flex;
      align-items:center;
      gap:12px;
      box-shadow:0 4px 18px rgba(0,0,0,.12);
    }

    .whatsapp-icon{
      width:50px;
      height:50px;
      border-radius:50%;
      background:#c79b1b;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      font-size:24px;
      flex-shrink:0;
    }

    .whatsapp-text{
      line-height:1.05;
    }

    .whatsapp-text strong{
      display:block;
      font-size:16px;
      color:#5a4720;
    }

    .whatsapp-text span{
      font-size:14px;
      color:#6d6555;
    }

    /* ================= RESPONSIVE ================= */

    @media(max-width:1200px){

      .products-grid{
        grid-template-columns:repeat(3,1fr);
      }

    }

    @media(max-width:992px){

      .shop-container{
        flex-direction:column;
      }

      .filters-sidebar{
        width:100%;
        position:relative;
        top:0;
      }

      .products-grid{
        grid-template-columns:repeat(3,1fr);
      }

    }

    @media(max-width:768px){

      .category-hero{
        padding:105px 16px 24px;
      }

      .category-hero h1{
        font-size:40px;
      }

      .category-hero p{
        font-size:16px;
      }

      .products-grid{
        grid-template-columns:repeat(2,1fr);
        gap:20px 14px;
      }

      .product-name{
        font-size:17px;
      }

      .products-topbar{
        flex-direction:column;
        align-items:flex-start;
      }

      .sort-select{
        width:100%;
      }

      .whatsapp-fixed{
        transform:scale(.9);
        left:8px;
      }

    }

    @media(max-width:480px){

      .products-grid{
        gap:18px 12px;
      }

      .product-image-wrap{
        border-radius:18px;
      }

      .product-name{
        font-size:15px;
      }

      .product-price{
        font-size:17px;
      }

      .filters-sidebar{
        border-radius:18px;
      }

    }

  </style>
</head>

<body>

<div id="origen-header"></div>

<!-- HERO -->

<section class="category-hero">

  <h1 id="title">Más Vendidos</h1>

  <p id="resultsText">
    Explora nuestros perfumes más vendidos.
  </p>

</section>

<!-- SHOP -->

<section class="shop-container">

  <!-- SIDEBAR -->

  <aside class="filters-sidebar">

    <div class="filter-group">

      <div class="filter-header">
        <h3>Categorías</h3>
        <i class="fa-solid fa-chevron-up"></i>
      </div>

      <div class="filter-options">

        <label>
          <input type="checkbox" value="Hombre">
          Perfumes Hombre
        </label>

        <label>
          <input type="checkbox" value="Mujer">
          Perfumes Mujer
        </label>

        <label>
          <input type="checkbox" value="Unisex">
          Perfumes Unisex
        </label>

      </div>

    </div>

    <div class="filter-group">

      <div class="filter-header">
        <h3>Precio</h3>
        <i class="fa-solid fa-chevron-up"></i>
      </div>

      <div class="range-wrap">

        <input
          type="range"
          min="0"
          max="1000000"
          value="1000000"
          class="price-slider"
          id="priceRange"
        >

      </div>

      <div class="price-values">

        <input
          type="text"
          class="price-box"
          value="$ 0"
          readonly
        >

        <span class="hasta">hasta</span>

        <input
          type="text"
          class="price-box"
          id="priceValue"
          value="$ 1.000.000"
          readonly
        >

      </div>

    </div>

  </aside>

  <!-- CONTENT -->

  <div class="shop-content">

    <div class="products-topbar">

      <p id="cantidadProductos"></p>

      <select class="sort-select" id="sortSelect">

        <option value="destacados">
          Ordenar por destacados
        </option>

        <option value="menor">
          Precio: menor a mayor
        </option>

        <option value="mayor">
          Precio: mayor a menor
        </option>

        <option value="az">
          Nombre: A-Z
        </option>

      </select>

    </div>

    <div class="products-grid" id="productsGrid"></div>

  </div>

</section>

<!-- WHATSAPP -->

<a href="https://wa.me/573000000000"
   class="whatsapp-fixed"
   target="_blank">

  <div class="whatsapp-icon">
    <i class="fab fa-whatsapp"></i>
  </div>

  <div class="whatsapp-text">
    <strong>Contacta a un experto</strong>
    <span>Asesoría personalizada</span>
  </div>

</a>

<div id="origen-footer"></div>

<script>

const grid = document.getElementById("productsGrid");
const title = document.getElementById("title");
const resultsText = document.getElementById("resultsText");
const cantidadProductos = document.getElementById("cantidadProductos");
const sortSelect = document.getElementById("sortSelect");
const priceRange = document.getElementById("priceRange");
const priceValue = document.getElementById("priceValue");

let TODOS = [];

/* ===== DESCUENTO ===== */

function calcularPrecio(p){

  if(p.descuento){
    return p.precio - (p.precio * p.descuento / 100);
  }

  return p.precio;

}

/* ===== FORMATO ===== */

function formatPrice(value){

  return "$ " + value.toLocaleString("es-CO");

}

/* ===== URL ===== */

function getProductUrl(producto){

  if(producto.categoria === "Hombre"){
    return `producto-hombre.html?id=${producto.id}`;
  }

  if(producto.categoria === "Mujer"){
    return `producto-mujer.html?id=${producto.id}`;
  }

  if(producto.categoria === "Unisex"){
    return `producto-unisex.html?id=${producto.id}`;
  }

  return "#";

}

/* ===== RENDER ===== */

function render(products){

  grid.innerHTML = "";

  cantidadProductos.textContent =
    `${products.length} producto(s) encontrados`;

  if(products.length === 0){

    grid.innerHTML = `
      <p style="
        font-size:18px;
        color:#5a4720;
      ">
        No hay productos disponibles
      </p>
    `;

    return;

  }

  products.forEach(producto => {

    grid.innerHTML += `

      <article class="product-card">

        <a href="${getProductUrl(producto)}"
           class="product-card-link">

          <div class="product-image-wrap">

            ${producto.nuevo
              ? `<span class="tag">Nuevo</span>`
              : ''
            }

            ${producto.descuento
              ? `<span class="tag discount">-${producto.descuento}%</span>`
              : ''
            }

            <img class="img-main"
                 src="${producto.imagen}"
                 alt="${producto.nombre}">

            <img class="img-hover"
                 src="${producto.hover || producto.imagen}"
                 alt="${producto.nombre}">

          </div>

          <div class="product-info">

            <div class="product-category">
              ${producto.categoria}
            </div>

            <h3 class="product-name">
              ${producto.nombre}
            </h3>

            ${
              producto.descuento
              ? `
                <p class="price-old">
                  ${formatPrice(producto.precio)}
                </p>

                <p class="product-price">
                  ${formatPrice(calcularPrecio(producto))}
                </p>
              `
              : `
                <p class="product-price">
                  ${formatPrice(producto.precio)}
                </p>
              `
            }

          </div>

        </a>

      </article>

    `;

  });

}

/* ===== FILTROS ===== */

function aplicarFiltros(){

  let productos = [...TODOS];

  const checks = document.querySelectorAll(
    '.filter-options input:checked'
  );

  const categorias = [...checks].map(c => c.value);

  if(categorias.length > 0){

    productos = productos.filter(p =>
      categorias.includes(p.categoria)
    );

  }

  const maxPrecio = parseInt(priceRange.value);

  productos = productos.filter(p =>
    calcularPrecio(p) <= maxPrecio
  );

  const orden = sortSelect.value;

  if(orden === "menor"){

    productos.sort((a,b) =>
      calcularPrecio(a) - calcularPrecio(b)
    );

  }

  if(orden === "mayor"){

    productos.sort((a,b) =>
      calcularPrecio(b) - calcularPrecio(a)
    );

  }

  if(orden === "az"){

    productos.sort((a,b) =>
      a.nombre.localeCompare(b.nombre)
    );

  }

  render(productos);

}

/* ===== EVENTOS ===== */

document.addEventListener("change", aplicarFiltros);

priceRange.addEventListener("input", () => {

  priceValue.value =
    formatPrice(parseInt(priceRange.value));

  aplicarFiltros();

});

/* ===== JSON ===== */

async function cargarProductos(){

  try{

    const res = await fetch("data/mas-vendidos.json");

    const data = await res.json();

    let productos = data.mas_vendidos || [];

    TODOS = productos;

    const tipo =
      new URLSearchParams(window.location.search)
      .get("tipo") || "mas_vendidos";

    if(tipo === "mas_vendidos"){

      title.innerText = "Más Vendidos";

      resultsText.innerText =
        `Explora nuestros perfumes más vendidos.`;

    }

    if(tipo === "nuevos"){

      title.innerText = "Nuevos";

      productos = productos.filter(p => p.nuevo);

      TODOS = productos;

      resultsText.innerText =
        `Descubre los nuevos ingresos.`;

    }

    if(tipo === "descuentos"){

      title.innerText = "Descuentos";

      productos = productos.filter(p => p.descuento);

      TODOS = productos;

      resultsText.innerText =
        `Las mejores ofertas disponibles.`;

    }

    render(productos);

  }catch(error){

    console.error(error);

    grid.innerHTML = `
      <p style="text-align:center;">
        Error cargando productos
      </p>
    `;

  }

}

/* ===== INIT ===== */

cargarProductos();

</script>

<script src="header-origen.js?v=12"></script>

<script>

fetch("footer-origen.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("origen-footer").innerHTML = data;
  });

</script>

</body>
</html>
