<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="stylesheet" href="header-origen.css?v=12">
  <link rel="stylesheet" href="footer-origen.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Más Vendidos | Origen Perfumería</title>

  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      font-family:'Times New Roman', serif;
      background:#D9D7D7;
      color:#2f2b1f;
      overflow-x:hidden;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    img{
      max-width:100%;
      display:block;
    }

    /* ================= HERO ================= */

    .category-hero{
      width:100%;
      padding:145px 20px 35px;
      text-align:center;
      background:#d9d7d7;
    }

    .category-hero h1{
      font-size:48px;
      color:#5a4720;
      margin-bottom:12px;
      font-weight:normal;
      letter-spacing:.5px;
    }

    .category-hero p{
      font-size:16px;
      color:#5f5847;
    }

    /* ================= SHOP ================= */

    .shop-container{
      width:min(1450px, 94%);
      margin:0 auto 60px;
      display:flex;
      gap:28px;
      align-items:flex-start;
    }

    /* ================= SIDEBAR ================= */

    .filters-sidebar{
      width:280px;
      background:#d3cfca;
      border-radius:28px;
      padding:24px;
      position:sticky;
      top:110px;
      flex-shrink:0;
    }

    .filter-group{
      margin-bottom:30px;
      border-bottom:1px solid rgba(90,71,32,.12);
      padding-bottom:22px;
    }

    .filter-group:last-child{
      border-bottom:none;
      margin-bottom:0;
      padding-bottom:0;
    }

    .filter-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:18px;
    }

    .filter-header h3{
      font-size:24px;
      color:#4e3d1f;
      font-weight:normal;
    }

    .filter-header i{
      font-size:14px;
      color:#6b5a35;
    }

    .filter-options{
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .filter-options label{
      display:flex;
      align-items:center;
      gap:12px;
      font-size:16px;
      color:#5a4720;
      cursor:pointer;
    }

    .filter-options input[type="checkbox"]{
      width:18px;
      height:18px;
      accent-color:#8f6b1f;
      cursor:pointer;
    }

    .price-slider{
      width:100%;
      accent-color:#8f6b1f;
      margin:12px 0 16px;
      cursor:pointer;
    }

    .price-values{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .price-box{
      background:#ece9e5;
      border-radius:14px;
      padding:13px;
      text-align:center;
      font-size:15px;
      color:#5a4720;
      border:none;
      width:100%;
      font-family:'Times New Roman', serif;
    }

    /* ================= CONTENT ================= */

    .shop-content{
      flex:1;
      min-width:0;
    }

    .products-topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:28px;
      flex-wrap:wrap;
      gap:14px;
    }

    .products-topbar p{
      color:#5f5a46;
      font-size:16px;
    }

    .sort-select{
      padding:14px 18px;
      border:none;
      border-radius:16px;
      background:#ece9e5;
      font-size:16px;
      color:#5a4720;
      font-family:'Times New Roman', serif;
      cursor:pointer;
      min-width:240px;
      outline:none;
    }

    /* ================= GRID ================= */

    .products-grid{
      display:grid;
      grid-template-columns:repeat(4, minmax(0, 1fr));
      gap:24px 20px;
    }

    .product-card{
      position:relative;
    }

    .product-card-link{
      display:block;
    }

    .product-image-wrap{
      position:relative;
      overflow:hidden;
      border-radius:26px;
      background:#efeeee;
      aspect-ratio:4 / 4.7;
    }

    .product-image-wrap img{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      transition:0.4s ease;
    }

    .img-main{
      opacity:1;
    }

    .img-hover{
      opacity:0;
    }

    .product-card:hover .img-main{
      opacity:0;
      transform:scale(1.04);
    }

    .product-card:hover .img-hover{
      opacity:1;
      transform:scale(1.04);
    }

    /* ================= TAGS ================= */

    .tag{
      position:absolute;
      top:14px;
      left:14px;
      z-index:5;
      background:#111;
      color:#fff;
      padding:7px 12px;
      border-radius:999px;
      font-size:11px;
      letter-spacing:.08em;
      text-transform:uppercase;
    }

    .tag.discount{
      background:#b22222;
      top:52px;
    }

    /* ================= INFO ================= */

    .product-info{
      padding:14px 6px 0;
    }

    .product-category{
      font-size:12px;
      color:#7b7460;
      margin-bottom:7px;
      text-transform:uppercase;
      letter-spacing:.16em;
    }

    .product-name{
      font-size:20px;
      line-height:1.2;
      min-height:52px;
      margin-bottom:10px;
      color:#1f1d18;
      font-weight:bold;
    }

    .price-old{
      text-decoration:line-through;
      color:#777;
      font-size:14px;
      margin-bottom:4px;
    }

    .product-price{
      font-size:20px;
      color:#c9a227;
      font-weight:bold;
    }

    /* ================= RESPONSIVE ================= */

    @media (max-width:1200px){

      .products-grid{
        grid-template-columns:repeat(3, 1fr);
      }

      .filters-sidebar{
        width:250px;
      }
    }

    @media (max-width:992px){

      .shop-container{
        flex-direction:column;
      }

      .filters-sidebar{
        width:100%;
        position:relative;
        top:0;
      }

      .products-grid{
        grid-template-columns:repeat(3, 1fr);
      }
    }

    @media (max-width:768px){

      .category-hero{
        padding:125px 18px 30px;
      }

      .category-hero h1{
        font-size:34px;
      }

      .products-topbar{
        flex-direction:column;
        align-items:flex-start;
      }

      .sort-select{
        width:100%;
      }

      .products-grid{
        grid-template-columns:repeat(2, 1fr);
        gap:18px 14px;
      }

      .product-name{
        font-size:16px;
        min-height:42px;
      }

      .product-price{
        font-size:17px;
      }

      .filters-sidebar{
        border-radius:24px;
      }
    }

    @media (max-width:480px){

      .category-hero h1{
        font-size:30px;
      }

      .products-grid{
        gap:16px 12px;
      }

      .product-image-wrap{
        border-radius:20px;
      }

      .product-info{
        padding-top:10px;
      }

      .product-category{
        font-size:11px;
      }

      .product-name{
        font-size:15px;
      }

      .product-price{
        font-size:16px;
      }
    }
  </style>
</head>

<body>

<div id="origen-header"></div>

<section class="category-hero">
  <h1 id="title">Más Vendidos</h1>

  <p id="resultsText">
    Explora nuestros perfumes más vendidos.
  </p>
</section>

<section class="shop-container">

  <!-- SIDEBAR -->

  <aside class="filters-sidebar">

    <div class="filter-group">
      <div class="filter-header">
        <h3>Categorías</h3>
        <i class="fa-solid fa-chevron-up"></i>
      </div>

      <div class="filter-options">
        <label>
          <input type="checkbox" value="Hombre">
          Perfumes Hombre
        </label>

        <label>
          <input type="checkbox" value="Mujer">
          Perfumes Mujer
        </label>

        <label>
          <input type="checkbox" value="Unisex">
          Perfumes Unisex
        </label>
      </div>
    </div>

    <div class="filter-group">

      <div class="filter-header">
        <h3>Precio</h3>
        <i class="fa-solid fa-chevron-up"></i>
      </div>

      <input
        type="range"
        min="0"
        max="1000000"
        value="1000000"
        class="price-slider"
        id="priceRange"
      >

      <div class="price-values">

        <input
          type="text"
          class="price-box"
          value="$ 0"
          readonly
        >

        <input
          type="text"
          class="price-box"
          id="priceValue"
          value="$ 1.000.000"
          readonly
        >

      </div>
    </div>

  </aside>

  <!-- CONTENT -->

  <div class="shop-content">

    <div class="products-topbar">

      <p id="cantidadProductos"></p>

      <select class="sort-select" id="sortSelect">
        <option value="destacados">
          Ordenar por destacados
        </option>

        <option value="menor">
          Precio: menor a mayor
        </option>

        <option value="mayor">
          Precio: mayor a menor
        </option>

        <option value="az">
          Nombre: A-Z
        </option>
      </select>

    </div>

    <div class="products-grid" id="productsGrid"></div>

  </div>

</section>

<div id="origen-footer"></div>

<script>

const grid = document.getElementById("productsGrid");
const title = document.getElementById("title");
const resultsText = document.getElementById("resultsText");
const cantidadProductos = document.getElementById("cantidadProductos");
const sortSelect = document.getElementById("sortSelect");
const priceRange = document.getElementById("priceRange");
const priceValue = document.getElementById("priceValue");

let TODOS = [];

/* ===== DESCUENTO ===== */

function calcularPrecio(p) {

  if (p.descuento) {
    return p.precio - (p.precio * p.descuento / 100);
  }

  return p.precio;
}

/* ===== FORMATO ===== */

function formatPrice(value){

  return "$ " + value.toLocaleString("es-CO");
}

/* ===== URL PRODUCTO ===== */

function getProductUrl(producto){

  if(producto.categoria === "Hombre"){
    return `producto-hombre.html?id=${producto.id}`;
  }

  if(producto.categoria === "Mujer"){
    return `producto-mujer.html?id=${producto.id}`;
  }

  if(producto.categoria === "Unisex"){
    return `producto-unisex.html?id=${producto.id}`;
  }

  return "#";
}

/* ===== RENDER ===== */

function render(products){

  grid.innerHTML = "";

  cantidadProductos.textContent =
    `${products.length} producto(s) encontrados`;

  if(products.length === 0){

    grid.innerHTML = `
      <p style="
        font-size:18px;
        color:#5a4720;
      ">
        No hay productos disponibles
      </p>
    `;

    return;
  }

  products.forEach(producto => {

    grid.innerHTML += `

      <article class="product-card">

        <a href="${getProductUrl(producto)}"
           class="product-card-link">

          <div class="product-image-wrap">

            ${producto.nuevo
              ? `<span class="tag">Nuevo</span>`
              : ''
            }

            ${producto.descuento
              ? `<span class="tag discount">-${producto.descuento}%</span>`
              : ''
            }

            <img class="img-main"
                 src="${producto.imagen}"
                 alt="${producto.nombre}">

            <img class="img-hover"
                 src="${producto.hover || producto.imagen}"
                 alt="${producto.nombre}">

          </div>

          <div class="product-info">

            <div class="product-category">
              ${producto.categoria}
            </div>

            <h3 class="product-name">
              ${producto.nombre}
            </h3>

            ${
              producto.descuento
              ? `
                <p class="price-old">
                  ${formatPrice(producto.precio)}
                </p>

                <p class="product-price">
                  ${formatPrice(calcularPrecio(producto))}
                </p>
              `
              : `
                <p class="product-price">
                  ${formatPrice(producto.precio)}
                </p>
              `
            }

          </div>

        </a>

      </article>
    `;
  });
}

/* ===== FILTROS ===== */

function aplicarFiltros(){

  let productos = [...TODOS];

  /* Categorías */

  const checks = document.querySelectorAll(
    '.filter-options input:checked'
  );

  const categorias = [...checks].map(c => c.value);

  if(categorias.length > 0){

    productos = productos.filter(p =>
      categorias.includes(p.categoria)
    );
  }

  /* Precio */

  const maxPrecio = parseInt(priceRange.value);

  productos = productos.filter(p =>
    calcularPrecio(p) <= maxPrecio
  );

  /* Orden */

  const orden = sortSelect.value;

  if(orden === "menor"){

    productos.sort((a,b) =>
      calcularPrecio(a) - calcularPrecio(b)
    );
  }

  if(orden === "mayor"){

    productos.sort((a,b) =>
      calcularPrecio(b) - calcularPrecio(a)
    );
  }

  if(orden === "az"){

    productos.sort((a,b) =>
      a.nombre.localeCompare(b.nombre)
    );
  }

  render(productos);
}

/* ===== EVENTOS ===== */

document.addEventListener("change", aplicarFiltros);

priceRange.addEventListener("input", () => {

  priceValue.value =
    formatPrice(parseInt(priceRange.value));

  aplicarFiltros();
});

/* ===== CARGAR JSON ===== */

async function cargarProductos() {

  try {

    const res = await fetch("data/mas-vendidos.json");

    const data = await res.json();

    let productos = data.mas_vendidos || [];

    TODOS = productos;

    const tipo =
      new URLSearchParams(window.location.search)
      .get("tipo") || "mas_vendidos";

    if (tipo === "mas_vendidos") {

      title.innerText = "Más Vendidos";

      resultsText.innerText =
        `${productos.length} productos`;
    }

    if (tipo === "nuevos") {

      title.innerText = "Nuevos";

      productos = productos.filter(p => p.nuevo);

      TODOS = productos;

      resultsText.innerText =
        `${productos.length} productos`;
    }

    if (tipo === "descuentos") {

      title.innerText = "Descuentos";

      productos = productos.filter(p => p.descuento);

      TODOS = productos;

      resultsText.innerText =
        `${productos.length} productos`;
    }

    render(productos);

  } catch (error) {

    console.error("Error cargando JSON:", error);

    grid.innerHTML = `
      <p style="text-align:center;">
        Error cargando productos
      </p>
    `;
  }
}

/* ===== INIT ===== */

cargarProductos();

</script>

<script src="header-origen.js?v=12"></script>

<script>
fetch("footer-origen.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("origen-footer").innerHTML = data;
  });
</script>

</body>
</html>
