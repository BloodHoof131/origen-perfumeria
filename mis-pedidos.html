<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
  async function cargarPedidos() {
    const user = await obtenerUsuarioActual();
    if (!user) {
      window.location.href = "cuenta.html";
      return;
    }

    const { data, error } = await supabase
      .from("pedidos")
      .select("*")
      .eq("user_id", user.id)
      .order("created_at", { ascending: false });

    if (error) {
      console.error(error);
      return;
    }

    const contenedor = document.getElementById("pedidosContainer");
    contenedor.innerHTML = "";

    if (!data.length) {
      contenedor.innerHTML = "<p>No tienes pedidos todavía.</p>";
      return;
    }

    data.forEach(pedido => {
      const div = document.createElement("div");
      div.innerHTML = `
        <div style="background:#ece8dd;padding:16px;border-radius:16px;margin-bottom:14px;">
          <h3>Pedido ${pedido.id}</h3>
          <p>Fecha: ${new Date(pedido.created_at).toLocaleString("es-CO")}</p>
          <p>Estado: ${pedido.estado}</p>
          <p>Total: $${Number(pedido.total).toLocaleString("es-CO")}</p>
        </div>
      `;
      contenedor.appendChild(div);
    });
  }

  cargarPedidos();
</script>
