<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Más Vendidos | Origen Perfumería</title>

  <link rel="stylesheet" href="header-origen.css?v=12">
  <link rel="stylesheet" href="footer-origen.css">

  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      font-family:'Times New Roman', serif;
      background:#D9D7D7;
      color:#2f2b1f;
      overflow-x:hidden;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    img{
      max-width:100%;
      display:block;
    }

    /* =========================
       HERO
    ========================== */

    .category-hero{
      padding:140px 16px 20px;
      text-align:center;
    }

    .category-hero h1{
      font-size:34px;
      color:#5a4720;
      margin-bottom:8px;
      font-weight:normal;
    }

    .category-hero p{
      max-width:700px;
      margin:0 auto;
      font-size:14px;
      color:#5f5847;
    }

    /* =========================
       LAYOUT
    ========================== */

    .shop-container{
      width:min(1320px, 94%);
      margin:0 auto 40px;
      display:grid;
      grid-template-columns:220px 1fr;
      gap:18px;
      align-items:start;
    }

    /* =========================
       SIDEBAR
    ========================== */

    .filters{
      background:#d3cfca;
      border-radius:22px;
      padding:18px;
      position:sticky;
      top:105px;
    }

    .filter-block{
      padding-bottom:18px;
      margin-bottom:18px;
      border-bottom:1px solid rgba(90,71,32,.12);
    }

    .filter-block:last-child{
      border-bottom:none;
      margin-bottom:0;
      padding-bottom:0;
    }

    .filter-title{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:14px;
    }

    .filter-title h3{
      font-size:20px;
      color:#4e3d1f;
      font-weight:normal;
    }

    .filter-title i{
      font-size:12px;
      color:#6b5a35;
    }

    .filter-list{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .filter-list label{
      display:flex;
      align-items:center;
      gap:10px;
      cursor:pointer;
      font-size:15px;
      color:#5a4720;
    }

    .filter-list input[type="checkbox"]{
      width:16px;
      height:16px;
      accent-color:#8f6b1f;
      cursor:pointer;
    }

    .price-slider{
      width:100%;
      accent-color:#8f6b1f;
      margin:12px 0;
      cursor:pointer;
    }

    .price-box{
      width:100%;
      border:none;
      background:#ece9e5;
      border-radius:12px;
      padding:12px;
      text-align:center;
      font-family:'Times New Roman', serif;
      color:#5a4720;
      font-size:14px;
      outline:none;
    }

    /* =========================
       CONTENT
    ========================== */

    .products-area{
      min-width:0;
    }

    .products-topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      margin-bottom:18px;
      flex-wrap:wrap;
    }

    .products-topbar p{
      color:#5f5a46;
      font-size:14px;
    }

    .sort-select{
      padding:10px 14px;
      border-radius:12px;
      border:none;
      background:#ece9e5;
      color:#5a4720;
      font-size:14px;
      font-family:'Times New Roman', serif;
      outline:none;
      cursor:pointer;
    }

    /* =========================
       GRID
    ========================== */

    .products-grid{
      display:grid;
      grid-template-columns:repeat(4, minmax(0, 1fr));
      gap:16px;
    }

    /* =========================
       CARD
    ========================== */

    .product-card{
      position:relative;
    }

    .product-card-link{
      display:block;
    }

    .product-image-wrap{
      position:relative;
      overflow:hidden;
      border-radius:18px;
      background:#efeeee;
      aspect-ratio:4 / 4.4;
    }

    .product-image-wrap img{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      transition:.4s ease;
    }

    .img-main{
      opacity:1;
    }

    .img-hover{
      opacity:0;
    }

    .product-card:hover .img-main{
      opacity:0;
      transform:scale(1.03);
    }

    .product-card:hover .img-hover{
      opacity:1;
      transform:scale(1.03);
    }

    /* =========================
       TAGS
    ========================== */

    .tag{
      position:absolute;
      top:12px;
      left:12px;
      z-index:5;
      background:#111;
      color:#fff;
      padding:6px 11px;
      border-radius:999px;
      font-size:10px;
      letter-spacing:.08em;
      text-transform:uppercase;
    }

    .tag.discount{
      background:#b22222;
      top:46px;
    }

    /* =========================
       INFO
    ========================== */

    .product-info{
      padding:12px 4px 0;
    }

    .product-category{
      font-size:11px;
      color:#7b7460;
      margin-bottom:6px;
      text-transform:uppercase;
      letter-spacing:.12em;
    }

    .product-name{
      font-size:16px;
      line-height:1.15;
      color:#1f1d18;
      margin-bottom:8px;
      min-height:40px;
    }

    .price-old{
      text-decoration:line-through;
      color:#777;
      font-size:13px;
      margin-bottom:3px;
    }

    .product-price{
      font-size:18px;
      color:#c9a227;
      font-weight:bold;
    }

    /* =========================
       FLOATING BUTTONS
    ========================== */

    .floating-whatsapp{
      position:fixed;
      right:20px;
      bottom:24px;
      width:58px;
      height:58px;
      border-radius:50%;
      background:#25d366;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      font-size:28px;
      z-index:999;
      box-shadow:0 10px 30px rgba(0,0,0,.15);
    }

    .scroll-top{
      position:fixed;
      right:20px;
      bottom:95px;
      width:48px;
      height:48px;
      border:none;
      border-radius:50%;
      background:#5a4720;
      color:#fff;
      font-size:18px;
      cursor:pointer;
      z-index:999;
      opacity:0;
      visibility:hidden;
      transition:.3s ease;
    }

    .scroll-top.show{
      opacity:1;
      visibility:visible;
    }

    /* =========================
       RESPONSIVE
    ========================== */

    @media (max-width:1200px){

      .products-grid{
        grid-template-columns:repeat(3, 1fr);
      }

    }

    @media (max-width:992px){

      .shop-container{
        grid-template-columns:1fr;
      }

      .filters{
        position:relative;
        top:0;
      }

    }

    @media (max-width:768px){

      .category-hero{
        padding:120px 16px 18px;
      }

      .category-hero h1{
        font-size:28px;
      }

      .products-grid{
        grid-template-columns:repeat(2, 1fr);
        gap:14px;
      }

      .product-name{
        font-size:15px;
        min-height:38px;
      }

      .product-price{
        font-size:16px;
      }

      .products-topbar{
        flex-direction:column;
        align-items:flex-start;
      }

      .sort-select{
        width:100%;
      }

    }

    @media (max-width:480px){

      .products-grid{
        gap:12px;
      }

      .product-image-wrap{
        border-radius:16px;
      }

      .product-name{
        font-size:14px;
      }

      .product-price{
        font-size:15px;
      }

    }

  </style>
</head>
<body>

<div id="origen-header"></div>

<!-- HERO -->

<section class="category-hero">

  <h1 id="title">Más Vendidos</h1>

  <p id="resultsText">
    Explora nuestros perfumes más vendidos.
  </p>

</section>

<!-- SHOP -->

<section class="shop-container">

  <!-- FILTERS -->

  <aside class="filters">

    <div class="filter-block">

      <div class="filter-title">
        <h3>Categorías</h3>
        <i class="fa-solid fa-chevron-up"></i>
      </div>

      <div class="filter-list">

        <label>
          <input type="checkbox" value="Hombre">
          Perfumes Hombre
        </label>

        <label>
          <input type="checkbox" value="Mujer">
          Perfumes Mujer
        </label>

        <label>
          <input type="checkbox" value="Unisex">
          Perfumes Unisex
        </label>

      </div>

    </div>

    <div class="filter-block">

      <div class="filter-title">
        <h3>Precio</h3>
        <i class="fa-solid fa-chevron-up"></i>
      </div>

      <input
        type="range"
        min="0"
        max="1000000"
        value="1000000"
        class="price-slider"
        id="priceRange"
      >

      <input
        type="text"
        class="price-box"
        id="priceValue"
        value="$ 1.000.000"
        readonly
      >

    </div>

  </aside>

  <!-- PRODUCTS -->

  <div class="products-area">

    <div class="products-topbar">

      <p id="cantidadProductos"></p>

      <select class="sort-select" id="sortSelect">

        <option value="destacados">
          Ordenar por destacados
        </option>

        <option value="menor">
          Precio: menor a mayor
        </option>

        <option value="mayor">
          Precio: mayor a menor
        </option>

        <option value="az">
          Nombre: A-Z
        </option>

      </select>

    </div>

    <div class="products-grid" id="productsGrid"></div>

  </div>

</section>

<!-- FLOATING -->

<a
  href="https://wa.me/573001112233"
  class="floating-whatsapp"
  target="_blank"
>
  <i class="fab fa-whatsapp"></i>
</a>

<button class="scroll-top" id="scrollTopBtn">
  <i class="fa-solid fa-chevron-up"></i>
</button>

<div id="origen-footer"></div>

<script>

const grid = document.getElementById("productsGrid");
const title = document.getElementById("title");
const resultsText = document.getElementById("resultsText");
const cantidadProductos = document.getElementById("cantidadProductos");
const sortSelect = document.getElementById("sortSelect");
const priceRange = document.getElementById("priceRange");
const priceValue = document.getElementById("priceValue");

let TODOS = [];

/* =========================
   DESCUENTO
========================= */

function calcularPrecio(p){

  if(p.descuento){
    return p.precio - (p.precio * p.descuento / 100);
  }

  return p.precio;
}

/* =========================
   FORMATO PRECIO
========================= */

function formatPrice(value){
  return "$ " + value.toLocaleString("es-CO");
}

/* =========================
   URL PRODUCTO
========================= */

function getProductUrl(producto){

  if(producto.categoria === "Hombre"){
    return `producto-hombre.html?id=${producto.id}`;
  }

  if(producto.categoria === "Mujer"){
    return `producto-mujer.html?id=${producto.id}`;
  }

  if(producto.categoria === "Unisex"){
    return `producto-unisex.html?id=${producto.id}`;
  }

  return "#";
}

/* =========================
   RENDER
========================= */

function render(products){

  grid.innerHTML = "";

  cantidadProductos.textContent =
    `${products.length} producto(s) encontrados`;

  if(products.length === 0){

    grid.innerHTML = `
      <p style="font-size:16px;color:#5a4720;">
        No hay productos disponibles
      </p>
    `;

    return;
  }

  products.forEach(producto => {

    grid.innerHTML += `

      <article class="product-card">

        <a href="${getProductUrl(producto)}"
           class="product-card-link">

          <div class="product-image-wrap">

            ${producto.nuevo
              ? `<span class="tag">Nuevo</span>`
              : ''
            }

            ${producto.descuento
              ? `<span class="tag discount">-${producto.descuento}%</span>`
              : ''
            }

            <img
              class="img-main"
              src="${producto.imagen}"
              alt="${producto.nombre}"
            >

            <img
              class="img-hover"
              src="${producto.hover || producto.imagen}"
              alt="${producto.nombre}"
            >

          </div>

          <div class="product-info">

            <div class="product-category">
              ${producto.categoria}
            </div>

            <h3 class="product-name">
              ${producto.nombre}
            </h3>

            ${
              producto.descuento
              ? `
                <p class="price-old">
                  ${formatPrice(producto.precio)}
                </p>

                <p class="product-price">
                  ${formatPrice(calcularPrecio(producto))}
                </p>
              `
              : `
                <p class="product-price">
                  ${formatPrice(producto.precio)}
                </p>
              `
            }

          </div>

        </a>

      </article>

    `;

  });

}

/* =========================
   FILTROS
========================= */

function aplicarFiltros(){

  let productos = [...TODOS];

  /* Categorías */

  const checks = document.querySelectorAll(
    '.filter-list input:checked'
  );

  const categorias = [...checks].map(c => c.value);

  if(categorias.length > 0){

    productos = productos.filter(p =>
      categorias.includes(p.categoria)
    );

  }

  /* Precio */

  const maxPrecio = parseInt(priceRange.value);

  productos = productos.filter(p =>
    calcularPrecio(p) <= maxPrecio
  );

  /* Orden */

  const orden = sortSelect.value;

  if(orden === "menor"){

    productos.sort((a,b) =>
      calcularPrecio(a) - calcularPrecio(b)
    );

  }

  if(orden === "mayor"){

    productos.sort((a,b) =>
      calcularPrecio(b) - calcularPrecio(a)
    );

  }

  if(orden === "az"){

    productos.sort((a,b) =>
      a.nombre.localeCompare(b.nombre)
    );

  }

  render(productos);

}

/* =========================
   EVENTS
========================= */

document.addEventListener("change", aplicarFiltros);

priceRange.addEventListener("input", () => {

  priceValue.value =
    formatPrice(parseInt(priceRange.value));

  aplicarFiltros();

});

/* =========================
   LOAD JSON
========================= */

async function cargarProductos(){

  try{

    const res = await fetch("data/mas-vendidos.json");

    const data = await res.json();

    let productos = data.mas_vendidos || [];

    TODOS = productos;

    const tipo =
      new URLSearchParams(window.location.search)
      .get("tipo") || "mas_vendidos";

    if(tipo === "mas_vendidos"){

      title.innerText = "Más Vendidos";

      resultsText.innerText =
        `${productos.length} productos`;

    }

    if(tipo === "nuevos"){

      title.innerText = "Nuevos";

      productos = productos.filter(p => p.nuevo);

      TODOS = productos;

      resultsText.innerText =
        `${productos.length} productos`;

    }

    if(tipo === "descuentos"){

      title.innerText = "Descuentos";

      productos = productos.filter(p => p.descuento);

      TODOS = productos;

      resultsText.innerText =
        `${productos.length} productos`;

    }

    render(productos);

  }catch(error){

    console.error("Error cargando JSON:", error);

    grid.innerHTML = `
      <p style="text-align:center;">
        Error cargando productos
      </p>
    `;

  }

}

cargarProductos();

/* =========================
   SCROLL TOP
========================= */

const scrollTopBtn =
  document.getElementById("scrollTopBtn");

window.addEventListener("scroll", () => {

  if(window.scrollY > 300){

    scrollTopBtn.classList.add("show");

  }else{

    scrollTopBtn.classList.remove("show");

  }

});

scrollTopBtn.addEventListener("click", () => {

  window.scrollTo({
    top:0,
    behavior:"smooth"
  });

});

</script>

<script src="header-origen.js?v=12"></script>

<script>

fetch("footer-origen.html")
  .then(res => res.text())
  .then(data => {

    document.getElementById("origen-footer")
      .innerHTML = data;

  });

</script>

</body>
</html>
